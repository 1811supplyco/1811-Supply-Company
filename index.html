<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 1811</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .product-card img { transition: transform 0.3s ease; }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Barra de Navegación -->
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-gray-900">1811 SUPPLY CO.</h1>
            <button onclick="toggleCart()" class="bg-black text-white px-5 py-2 rounded-full text-sm font-bold flex items-center gap-2">
                CARRITO (<span id="cart-count">0</span>)
            </button>
        </div>
    </nav>

    <!-- Banner de Bienvenida -->
    <header class="container mx-auto mt-6 px-4">
        <div class="bg-black text-white p-8 rounded-3xl text-center">
            <h2 class="text-3xl font-bold mb-2">Everyday Carry</h2>
            <p class="text-gray-400 text-sm">Productos de cuero diseñados para durar.</p>
        </div>
    </header>

    <!-- Cuadrícula de Productos -->
    <main class="container mx-auto p-4 md:p-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="products-grid">
        <!-- Los productos se cargan aquí automáticamente -->
    </main>

    <!-- Panel Lateral del Carrito -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex justify-end">
        <div class="bg-white w-full max-w-md h-full p-8 shadow-2xl flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black">TU PEDIDO</h2>
                <button onclick="toggleCart()" class="text-gray-400 hover:text-black">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4">
                <!-- Items del carrito -->
            </div>

            <div class="border-t pt-6 mt-6">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-gray-500 font-medium">Total estimado:</span>
                    <span class="text-2xl font-black text-blue-600">S/ <span id="cart-total">0</span></span>
                </div>
                <button onclick="sendWhatsApp()" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-2xl font-bold text-lg transition-colors flex justify-center items-center gap-2">
                    Pedir por WhatsApp
                </button>
                <p class="text-center text-xs text-gray-400 mt-4">Al hacer clic serás redirigido a nuestro chat.</p>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE PRODUCTOS ---
        // Aquí es donde editas tus fotos, nombres y precios.
        const products = [
            { 
                id: 1, 
                name: "Zippered Wallet", 
                price: 89, 
                imgs: ["ZIPPERED.png", "ZIPPEREDdetalle.jpg"], // Agrega aquí los nombres de tus fotos subidas
                currentImg: 0 
            },
            { 
                id: 2, 
                name: "Didac Wallet", 
                price: 129, 
                imgs: ["didac.png", "DIDACatras.jpg"], 
                currentImg: 0 
            },
            { 
                id: 3, 
                name: "Dopp Kit", 
                price: 179, 
                imgs: ["DOPPKITmarron.png","detalle DOPPKIT.png"."detalleDOPPKIT.png], 
                currentImg: 0 
            }
        ];

        let cart = [];

        // --- MOTOR DE LA TIENDA ---
        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.map((p, pIndex) => `
                <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-gray-100 overflow-hidden">
                    <div class="relative w-full h-64 mb-4 overflow-hidden rounded-2xl bg-gray-50">
                        <img id="img-${pIndex}" src="${p.imgs[p.currentImg]}" class="w-full h-full object-cover">
                        
                        ${p.imgs.length > 1 ? `
                            <div class="absolute inset-0 flex justify-between items-center px-2">
                                <button onclick="changeImg(${pIndex}, -1)" class="bg-white/90 hover:bg-white p-2 rounded-full shadow-lg text-black transition-all">◀</button>
                                <button onclick="changeImg(${pIndex}, 1)" class="bg-white/90 hover:bg-white p-2 rounded-full shadow-lg text-black transition-all">▶</button>
                            </div>
                        ` : ''}
                    </div>
                    <div class="px-2">
                        <h3 class="font-bold text-xl text-gray-800">${p.name}</h3>
                        <p class="text-blue-600 font-black text-lg mt-1">S/ ${p.price}</p>
                        <button onclick="addToCart(${p.id})" class="w-full bg-gray-900 hover:bg-black text-white mt-4 py-3 rounded-xl font-bold transition-transform active:scale-95">
                            Agregar al carrito
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function changeImg(productIndex, direction) {
            const p = products[productIndex];
            p.currentImg += direction;
            if (p.currentImg >= p.imgs.length) p.currentImg = 0;
            if (p.currentImg < 0) p.currentImg = p.imgs.length - 1;
            document.getElementById(`img-${productIndex}`).src = p.imgs[p.currentImg];
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCart();
            // Feedback visual: abre el carrito automáticamente al agregar
            if(window.innerWidth > 768) toggleCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsContainer = document.getElementById('cart-items');
            itemsContainer.innerHTML = cart.map((item, index) => `
                <div class="flex gap-4 items-center bg-gray-50 p-3 rounded-2xl">
                    <img src="${item.imgs[0]}" class="w-16 h-16 object-cover rounded-lg">
                    <div class="flex-grow">
                        <h4 class="font-bold text-sm">${item.name}</h4>
                        <p class="text-blue-600 font-bold text-sm">S/ ${item.price}</p>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-red-400 hover:text-red-600 p-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total').innerText = total;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('hidden');
        }

        function sendWhatsApp() {
            if (cart.length === 0) return alert("Tu carrito está vacío");
            
            const phone = "51947833118"; // Pon tu número aquí
            let message = "¡Hola 1811 Supply Co.! 👋 Quiero realizar el siguiente pedido:%0A%0A";
            
            cart.forEach((item, index) => {
                message += `*${index + 1}.* ${item.name} - S/ ${item.price}%0A`;
            });
            
            const total = document.getElementById('cart-total').innerText;
            message += `%0A💰 *Total a pagar: S/ ${total}*%0A%0A¿Me confirman disponibilidad por favor?`;
            
            window.open(`https://wa.me/${phone}?text=${message}`);
        }

        // Iniciar la tienda
        renderProducts();
    </script>
</body>
</html>
