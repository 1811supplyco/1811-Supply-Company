<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1811 SUPPLY CO.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #d1d1d1; font-family: 'Inter', sans-serif; margin: 0; }
        .product-card { background-color: #111111; border: 1px solid #1f1f1f; transition: all 0.3s ease; }
        .product-card:hover { border-color: #333; }
        .category-btn { transition: all 0.2s; border-bottom: 2px solid transparent; cursor: pointer; padding-bottom: 4px; white-space: nowrap; font-size: 10px; font-weight: 900; color: #555; }
        .category-btn.active { border-color: white; color: white; }
        .variant-btn { border: 1px solid #333; font-size: 9px; padding: 5px 10px; cursor: pointer; color: #666; font-weight: 900; text-transform: uppercase; }
        .variant-btn.selected { background-color: white; color: black; border-color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .nav-arrow { background: rgba(0,0,0,0.6); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; position: absolute; top: 50%; transform: translateY(-50%); z-index: 30; }
    </style>
</head>
<body>

    <nav class="p-6 sticky top-0 bg-[#0a0a0a] z-[100] border-b border-white/5">
        <div class="container mx-auto flex justify-center">
            <a href="index.html">
                <img src="logo.jpeg" alt="1811 Logo" class="h-20 w-auto object-contain">
            </a>
        </div>
    </nav>

    <!-- Contenedor Principal -->
    <div id="main-content">
        <div class="container mx-auto px-6 mt-10">
            <div class="flex gap-8 border-b border-white/5 pb-4 uppercase tracking-widest overflow-x-auto no-scrollbar">
                <button onclick="filterProducts('TODOS')" class="category-btn active" id="btn-TODOS">TODOS</button>
                <button onclick="filterProducts('BILLETERAS')" class="category-btn" id="btn-BILLETERAS">BILLETERAS</button>
                <button onclick="filterProducts('ACCESORIOS')" class="category-btn" id="btn-ACCESORIOS">ACCESORIOS</button>
                <button onclick="filterProducts('BOLSOS')" class="category-btn" id="btn-BOLSOS">BOLSOS</button>
                <button onclick="filterProducts('CINTURONES')" class="category-btn" id="btn-CINTURONES">CINTURONES</button>
                <button onclick="filterProducts('LLAVEROS')" class="category-btn" id="btn-LLAVEROS">LLAVEROS</button>
                <button onclick="filterProducts('BEADS')" class="category-btn" id="btn-BEADS">BEADS</button>
            </div>
        </div>
        <main class="container mx-auto p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10" id="products-grid"></main>
    </div>

    <!-- Contenedor de Vista de Producto Único -->
    <div id="single-product-view" class="hidden container mx-auto p-6 min-h-screen">
        <button onclick="window.location.href='index.html'" class="mb-8 text-[10px] font-black uppercase tracking-widest text-gray-500">← Volver al catálogo</button>
        <div id="product-detail-content"></div>
    </div>

    <script>
        const products = [
            { id: 1, cat: "BOLSOS", name: "UTILITY DOPP KIT DISTRESSED CHOCOLATE", desc: "NECESER TODO TERRENO CON AMPLIO ESPACIO, BOLSILLO CON CIERRE, BOLSILLOS LATERALES Y HANDLE DE DOBLE AGARRE, PERFECTO PARA TUS ARTÍCULOS DE USO DIARIO (ASEO, TECH, ETC.)<br><br>MEDIDAS: 16 cm X 25 cm APROX<br>MATERIALES: CUERO DE RES FULL GRAIN, CANVAS Y CORDURA NYLON.", price: 179, imgs: ["DOPPKITmarron.png", "detalleDOPPKIT.png", "detalleDOPPKIT(2).png"], variants: [] },
            { id: 2, cat: "BILLETERAS", name: "ZIPPERED WALLET", desc: "BILLETERA MINIMALISTA DE DISEÑO JAPONES PARA TARJETAS, BILLETES Y MONEDAS.<br><br>MEDIDAS: 9.5 CM X 11 CM APROX.<br>MATERIALES: CUERO DE RES FULL GRAIN Y HERRAJE DE LATÓN MACIZO.", price: 89, imgs: ["ZIPPERED.png", "ZIPPEREDdetalle.png"], variants: [] },
            { id: 3, cat: "BILLETERAS", name: "GANADERO WALLET", desc: "BIFOLD HÍBRIDA CON ESPACIO PARA TARJETAS, BILLETES Y MINI HERRAMIENTAS.<br><br>MEDIDAS: 10.5 CM X 9 CM APROX.<br>MATERIALES: CUERO DE RES FULL GRAIN Y TELA CORDURA.", price: 109, imgs: ["GANADERO.png", "GANADEROabierto.png", "GANADEROdetalle.png"], varPhotos: { "MARRON": ["GANADERO.png", "GANADEROabierto.png", "GANADEROdetalle.png"], "NEGRO": ["GANADEROnegro.png", "GANADEROnegroabierto.png", "GANADEROdetallenegro.png"] }, variants: ["MARRON", "NEGRO"], selected: "MARRON" },
            { id: 4, cat: "BILLETERAS", name: "DÍDAC WALLET", desc: "TARJETERO MINIMALISTA PERFECTO PARA USO DIARIO.<br><br>MEDIDAS: 6.7 cm X 10.5 cm APROX.<br>MATERIALES: CUERO DE RES FULL GRAIN.", price: 129, imgs: ["didac.png", "DIDACatras.png"], varPhotos: { "MARRON": ["didac.png", "DIDACatras.png"], "NEGRO": ["DIDACnegro.png"] }, variants: ["MARRON", "NEGRO"], selected: "MARRON" },
            { id: 5, cat: "ACCESORIOS", name: "MULTITOOL CARD + FUNDA", desc: "TARJETA MULTIHERRAMIENTA CON 10 FUNCIONES.<br>MATERIAL: ACERO INOXIDABLE.", price: 89, imgs: ["MULTITOOL.png", "MULTITOOLfunda.png", "MULTITOOLfundanegra.png"], variants: [] },
            { id: 6, cat: "ACCESORIOS", name: "UTILITY TRAY", desc: "BANDEJA PARA OBJETOS DE BOLSILLO.<br><br>MATERIALES: CUERO DE RES FULL GRAIN Y TELA TWEED.", price: 99, varPhotos: { "SMALL": ["BANDEJAS.png"], "MEDIUM": ["BANDEJAM.png"], "LARGE": ["BANDEJAL.png"] }, varPrices: { "SMALL": 99, "MEDIUM": 129, "LARGE": 159 }, variants: ["SMALL", "MEDIUM", "LARGE"], selected: "SMALL" },
            { id: 7, cat: "ACCESORIOS", name: "COASTERS", desc: "SET DE POSAVASOS DE CUERO RÚSTICO.<br><br>MATERIALES: CUERO DE RES FULL GRAIN.", price: 89, imgs: ["COASTERS.png", "COASTERsola.png"], varPrices: { "SET DE 4": 89, "SET DE 6": 119 }, variants: ["SET DE 4", "SET DE 6"], selected: "SET DE 4" },
            { id: 10, cat: "LLAVEROS", name: "EL GANCHO", desc: "LLAVERO CON MOSQUETÓN DE PERFIL TÁCTICO.<br><br>MATERIALES: CUERO DE RES FULL GRAIN.", price: 79, imgs: ["GANCHO.png"], varPhotos: { "MARRON": ["GANCHO.png"], "NEGRO": ["GANCHOnegro.png"] }, variants: ["MARRON", "NEGRO"], selected: "MARRON" },
            { id: 11, cat: "BEADS", name: "SKULL BEAD", desc: "CUENTA DECORATIVA.<br>MATERIAL: LATÓN MACIZO.", price: 89, imgs: ["SKULLBEAD.png"], variants: [] },
            { id: 12, cat: "BEADS", name: "BABY DEVIL BEAD", desc: "CUENTA DECORATIVA.<br>MATERIAL: LATON MACIZO.", price: 99, imgs: ["BABYDEVIL.png"], variants: [] }
        ];

        let currentImgIdx = {};

        function init() {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            if (productId) {
                showSingleProduct(parseInt(productId));
            } else {
                render();
            }
        }

        function render(filter = 'TODOS') {
            document.getElementById('main-content').classList.remove('hidden');
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            const filtered = filter === 'TODOS' ? products : products.filter(p => p.cat === filter);

            filtered.forEach(p => {
                if(currentImgIdx[p.id] === undefined) currentImgIdx[p.id] = 0;
                let gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : p.imgs;
                let price = p.varPrices ? p.varPrices[p.selected] : p.price;

                const div = document.createElement('div');
                div.className = "product-card p-4 cursor-pointer";
                div.onclick = () => window.location.href = `?id=${p.id}`;
                div.innerHTML = `
                    <div class="aspect-square mb-4 overflow-hidden bg-black">
                        <img src="${gallery[0]}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex justify-between items-start">
                        <h3 class="font-bold text-[10px] text-white tracking-widest uppercase">${p.name}</h3>
                        <span class="text-[10px] text-gray-400 font-bold">S/ ${price}</span>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function showSingleProduct(id) {
            document.getElementById('main-content').classList.add('hidden');
            const view = document.getElementById('single-product-view');
            const container = document.getElementById('product-detail-content');
            view.classList.remove('hidden');

            const p = products.find(prod => prod.id === id);
            if(!p) return;

            if(currentImgIdx[p.id] === undefined) currentImgIdx[p.id] = 0;
            let gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : p.imgs;
            let price = p.varPrices ? p.varPrices[p.selected] : p.price;

            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                    <div class="relative aspect-square bg-black">
                        ${gallery.length > 1 ? `<div class="nav-arrow left-2" onclick="changeImg(${p.id}, -1)">‹</div>` : ''}
                        ${gallery.length > 1 ? `<div class="nav-arrow right-2" onclick="changeImg(${p.id}, 1)">›</div>` : ''}
                        <img src="${gallery[currentImgIdx[p.id]]}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex flex-col justify-center">
                        <h1 class="text-2xl font-black text-white tracking-tighter mb-2 uppercase">${p.name}</h1>
                        <p class="text-xl text-gray-400 mb-8 font-bold">S/ ${price}</p>
                        <div class="border-t border-white/10 pt-6 mb-8">
                            <h4 class="text-[10px] font-black uppercase text-white/40 mb-4 tracking-widest">Descripción</h4>
                            <p class="text-xs leading-relaxed text-gray-300 uppercase font-bold">${p.desc}</p>
                        </div>
                        <div class="flex gap-2 mb-10">
                            ${p.variants.map(v => `<button onclick="setVar(${p.id}, '${v}')" class="variant-btn ${p.selected === v ? 'selected' : ''}">${v}</button>`).join('')}
                        </div>
                        <button onclick="sendWhatsApp(${p.id})" class="w-full bg-white text-black py-5 text-[11px] font-black uppercase tracking-[0.2em] hover:invert transition-all">Pedir por WhatsApp</button>
                    </div>
                </div>
            `;
        }

        function setVar(id, v) {
            const p = products.find(prod => prod.id === id);
            p.selected = v;
            currentImgIdx[id] = 0;
            showSingleProduct(id);
        }

        function changeImg(id, dir) {
            const p = products.find(prod => prod.id === id);
            let gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : p.imgs;
            currentImgIdx[id] = (currentImgIdx[id] + dir + gallery.length) % gallery.length;
            showSingleProduct(id);
        }

        function sendWhatsApp(id) {
            const p = products.find(prod => prod.id === id);
            const price = p.varPrices ? p.varPrices[p.selected] : p.price;
            const variant = p.selected ? `Variante: ${p.selected}` : '';
            const msg = `Hola 1811, quisiera comprar:\n\n*${p.name}*\n${variant}\nPrecio: S/ ${price}\n\nLink: ${window.location.href}`;
            window.open(`https://wa.me/51947833118?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function filterProducts(cat) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${cat}`).classList.add('active');
            render(cat);
        }

        init();
    </script>
</body>
</html>
