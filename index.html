<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">TIENDA ONLINE</h1>
            <button onclick="toggleCart()" class="relative bg-black text-white px-4 py-2 rounded-lg">
                Carrito (<span id="cart-count">0</span>)
            </button>
        </div>
    </nav>

    <!-- Catálogo -->
    <main class="container mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6" id="products-grid">
        <!-- Los productos se cargan aquí -->
    </main>

    <!-- Modal del Carrito -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-end">
        <div class="bg-white w-full max-w-md h-full p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Tu Pedido</h2>
                <button onclick="toggleCart()" class="text-red-500">Cerrar</button>
            </div>
            <div id="cart-items" class="space-y-4"></div>
            <div class="border-t mt-6 pt-4">
                <p class="text-lg font-bold">Total: S/ <span id="cart-total">0</span></p>
                <button onclick="sendWhatsApp()" class="w-full bg-green-500 text-white py-3 rounded-lg mt-4 font-bold">
                    Enviar pedido por WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Zippered Wallet", price: 89, img: "https://via.placeholder.com/300" },
            { id: 2, name: "Utility Dopp Kit", price: 179, img: "https://via.placeholder.com/300" },
            { id: 3, name: "Didac Wallet", price: 109, img: "https://via.placeholder.com/300" }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded-xl shadow-sm border">
                    <img src="${p.img}" class="w-full h-48 object-cover rounded-lg mb-4">
                    <h3 class="font-bold text-lg">${p.name}</h3>
                    <p class="text-gray-600">S/ ${p.price}</p>
                    <button onclick="addToCart(${p.id})" class="w-full bg-blue-600 text-white mt-4 py-2 rounded-lg hover:bg-blue-700">
                        Agregar al carrito
                    </button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsContainer = document.getElementById('cart-items');
            itemsContainer.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center border-b pb-2">
                    <span>${item.name}</span>
                    <div class="flex items-center gap-4">
                        <span>S/ ${item.price}</span>
                        <button onclick="removeFromCart(${index})" class="text-xs text-red-400">Quitar</button>
                    </div>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total').innerText = total;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('hidden');
        }

        function sendWhatsApp() {
            const phone = "51947833118"; // Reemplaza con tu número
            let message = "Hola! Quiero realizar el siguiente pedido:%0A%0A";
            cart.forEach(item => message += `- ${item.name} (S/ ${item.price})%0A`);
            const total = document.getElementById('cart-total').innerText;
            message += `%0A*Total: S/ ${total}*`;
            window.open(`https://wa.me/${phone}?text=${message}`);
        }

        renderProducts();
    </script>
</body>
</html>
