<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1811 SUPPLY CO.</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .font-1811 { font-family: 'UnifrakturMaguntia', serif; font-size: 3.5rem; color: white; line-height: 1; }
        .font-supply { font-family: 'Inter', sans-serif; font-weight: 900; letter-spacing: -0.05em; color: #666; font-size: 1.2rem; text-transform: uppercase; }
        body { background-color: #0a0a0a; color: #d1d1d1; font-family: 'Inter', sans-serif; }
        img { filter: none !important; opacity: 1 !important; }
        .product-card { background-color: #111111; border: 1px solid #1f1f1f; position: relative; overflow: hidden; }
        .category-btn { transition: all 0.2s; border-bottom: 2px solid transparent; cursor: pointer; padding-bottom: 4px; white-space: nowrap; }
        .category-btn.active { border-color: white; color: white; font-weight: 900; }
        .info-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); padding: 2rem; display: flex; flex-direction: column; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 40; }
        .info-overlay.active { opacity: 1; pointer-events: auto; }
        .nav-arrow { background: rgba(0,0,0,0.6); color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; position: absolute; top: 50%; transform: translateY(-50%); z-index: 30; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }
        .variant-btn { border: 1px solid #333; font-size: 9px; padding: 5px 10px; cursor: pointer; color: #666; }
        .variant-btn.selected { background-color: white; color: black; font-weight: 900; border-color: white; }
    </style>
</head>
<body>

    <nav class="p-8 sticky top-0 bg-[#0a0a0a] z-[100] border-b border-white/5 text-center sm:text-left">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <span class="font-1811">1811</span>
                <span class="font-supply">Supply Co.</span>
            </div>
            <button onclick="toggleCart()" class="text-[10px] font-black tracking-widest text-white uppercase bg-white/5 px-4 py-2 border border-white/10">
                CARRITO (<span id="cart-count">0</span>)
            </button>
        </div>
    </nav>

    <!-- MENU DE CATEGORÍAS -->
    <div class="container mx-auto px-6 mt-10">
        <div class="flex gap-8 border-b border-white/5 pb-4 text-[10px] font-bold text-gray-500 uppercase tracking-widest overflow-x-auto">
            <button onclick="filterProducts('TODOS')" class="category-btn active" id="btn-TODOS">TODOS</button>
            <button onclick="filterProducts('BILLETERAS')" class="category-btn" id="btn-BILLETERAS">BILLETERAS</button>
            <button onclick="filterProducts('ACCESORIOS')" class="category-btn" id="btn-ACCESORIOS">ACCESORIOS</button>
            <button onclick="filterProducts('BOLSOS')" class="category-btn" id="btn-BOLSOS">BOLSOS</button>
            <button onclick="filterProducts('CINTURONES')" class="category-btn" id="btn-CINTURONES">CINTURONES</button>
            <button onclick="filterProducts('LLAVEROS')" class="category-btn" id="btn-LLAVEROS">LLAVEROS</button>
            <button onclick="filterProducts('BEADS')" class="category-btn" id="btn-BEADS">BEADS</button>
        </div>
    </div>

    <main class="container mx-auto p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10" id="products-grid"></main>

    <script>
        const products = [
            { id: 1, cat: "BOLSOS", name: "UTILITY DOPP KIT", desc: "Neceser full grain de alta capacidad. Interior forrado en lona repelente al agua. Medidas: 25x16cm.", price: 179, imgs: ["DOPPKITdetalle.png"], variants: [] },
            { id: 2, cat: "BILLETERAS", name: "ZIPPERED WALLET", desc: "Billetera con cierre de latón. Espacio para 8 tarjetas y billetes doblados.", price: 89, imgs: ["ZIPPERED.png", "ZIPPERED2.png"], variants: [] },
            { id: 3, cat: "BILLETERAS", name: "GANADERO WALLET", desc: "Diseño robusto para el día a día. Cuero curtido al vegetal con espacio para Victorinox.", price: 109, imgs: ["GANADERO.png"], varPhotos: { "MARRON": ["GANADERO.png"], "NEGRO": ["GANADEROnegro.png"] }, variants: ["MARRON", "NEGRO"], selected: "MARRON" },
            { id: 4, cat: "BILLETERAS", name: "DÍDAC WALLET", desc: "Tarjetero minimalista para el Everyday Carry.", price: 129, imgs: ["didac.png"], varPhotos: { "MARRON": ["didac.png"], "NEGRO": ["DIDACnegro.png"] }, variants: ["MARRON", "NEGRO"], selected: "MARRON" },
            { id: 6, cat: "ACCESORIOS", name: "UTILITY TRAY", desc: "Bandeja de descarga para tus esenciales. Hecha de cuero genuino y Tweed.", price: 99, 
                varPhotos: { 
                    "SMALL": ["tray-s.png"], 
                    "MEDIUM": ["tray-m.png"], 
                    "LARGE": ["tray-l.png"] 
                }, 
                varPrices: { "SMALL": 99, "MEDIUM": 129, "LARGE": 159 }, 
                variants: ["SMALL", "MEDIUM", "LARGE"], selected: "SMALL" },
            { id: 8, cat: "CINTURONES", name: "MIGHTY BELT", desc: "Correa de cuero de 4mm de grosor. Hebilla de acero inoxidable Black Buckle.", price: 149, imgs: ["MIGHTY.png", "MIGHTY2.png"], variants: [] },
            { id: 10, cat: "BEADS", name: "SKULL BRASS BEAD", desc: "Abalorio de latón macizo para tus navajas o llaveros EDC.", price: 45, imgs: ["BEAD1.png", "BEAD1_alt.png"], variants: [] },
            { id: 11, cat: "LLAVEROS", name: "LEATHER KEY FOB", desc: "Llavero de cuero genuino con herrajes de alta resistencia.", price: 35, imgs: ["LLAVERO.png"], variants: [] }
        ];

        let currentImgIdx = {};

        function render(filter = 'TODOS') {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            const filtered = filter === 'TODOS' ? products : products.filter(p => p.cat === filter);

            filtered.forEach(p => {
                if(currentImgIdx[p.id] === undefined) currentImgIdx[p.id] = 0;
                
                let gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : (p.imgs || []);
                const price = p.varPrices ? p.varPrices[p.selected] : p.price;

                const div = document.createElement('div');
                div.className = "product-card p-6";
                div.innerHTML = `
                    <div class="relative group aspect-square mb-6 overflow-hidden">
                        ${gallery.length > 1 ? `<div class="nav-arrow left-2" onclick="event.stopPropagation(); changeImg(${p.id}, -1, '${filter}')">‹</div>` : ''}
                        ${gallery.length > 1 ? `<div class="nav-arrow right-2" onclick="event.stopPropagation(); changeImg(${p.id}, 1, '${filter}')">›</div>` : ''}
                        
                        <img src="${gallery[currentImgIdx[p.id]] || 'placeholder.png'}" 
                             onclick="toggleInfo(${p.id})" 
                             class="w-full h-full object-cover cursor-help">
                        
                        <div id="info-${p.id}" class="info-overlay" onclick="toggleInfo(${p.id})">
                            <h4 class="text-white font-black text-[10px] uppercase mb-4 border-b border-white/20 pb-2 tracking-widest">Descripción</h4>
                            <p class="text-[11px] leading-relaxed text-gray-400 uppercase font-medium">${p.desc}</p>
                            <p class="mt-8 text-[9px] text-white/50 font-bold uppercase tracking-[0.2em]">Toca para volver</p>
                        </div>
                    </div>

                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-black text-[11px] text-white tracking-widest uppercase">${p.name}</h3>
                        <span class="text-xs text-gray-400">S/ ${price}</span>
                    </div>

                    <div class="flex gap-2 mb-8 h-8">
                        ${p.variants.map(v => `<button onclick="setVar(${p.id}, '${v}', '${filter}')" class="variant-btn ${p.selected === v ? 'selected' : ''}">${v}</button>`).join('')}
                    </div>
                    
                    <button onclick="alert('Producto añadido')" class="w-full bg-white text-black py-4 text-[10px] font-black uppercase tracking-widest hover:invert transition-all">Añadir</button>
                `;
                grid.appendChild(div);
            });
        }

        function changeImg(id, dir, filter) {
            const p = products.find(prod => prod.id === id);
            let gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : p.imgs;
            currentImgIdx[id] = (currentImgIdx[id] + dir + gallery.length) % gallery.length;
            render(filter);
        }

        function toggleInfo(id) { document.getElementById(`info-${id}`).classList.toggle('active'); }

        function filterProducts(cat) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${cat}`).classList.add('active');
            render(cat);
        }

        function setVar(id, v, f) {
            const p = products.find(prod => prod.id === id);
            p.selected = v;
            currentImgIdx[id] = 0; 
            render(f);
        }

        render();
    </script>
</body>
</html>
