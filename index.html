<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1811 SUPPLY CO. | SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #d1d1d1; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .product-card { background-color: #111111; border: 1px solid #1f1f1f; }
        
        .category-btn { text-align: left; padding: 12px 0; border-bottom: 1px solid #1f1f1f; font-size: 11px; font-weight: 900; color: #555; text-transform: uppercase; transition: 0.3s; width: 100%; }
        .category-btn.active { color: white; border-bottom-color: white; padding-left: 10px; }

        .variant-btn { border: 1px solid #333; font-size: 10px; padding: 8px 12px; cursor: pointer; color: #666; font-weight: 900; text-transform: uppercase; }
        .variant-btn.selected { background-color: white; color: black; border-color: white; }
        
        #cart-sidebar { position: fixed; right: -100%; top: 0; width: 85%; max-width: 380px; height: 100%; background: #0f0f0f; z-index: 200; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid #222; }
        #cart-sidebar.open { right: 0; }
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 150; display: none; }
        .cart-overlay.active { display: block; }

        .nav-arrow { 
            background: rgba(0,0,0,0.7); color: white; 
            width: 50px; height: 50px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; position: absolute; top: 50%; 
            transform: translateY(-50%); z-index: 50; font-size: 24px;
            -webkit-tap-highlight-color: transparent;
        }
        .left-arrow { left: 0; border-radius: 0 8px 8px 0; }
        .right-arrow { right: 0; border-radius: 8px 0 0 8px; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="p-4 md:p-6 sticky top-0 bg-[#0a0a0a] z-[100] border-b border-white/5">
        <div class="container mx-auto flex justify-between items-center">
            <button onclick="toggleCategories()" class="md:hidden text-[10px] font-black uppercase tracking-widest text-white bg-white/5 px-3 py-2 rounded">Menú</button>
            <a href="index.html" class="flex-1 flex justify-center md:justify-start">
                <img src="logo2.png" alt="1811 Logo" class="h-10 md:h-16 w-auto object-contain">
            </a>
            <button onclick="toggleCart()" class="border border-white/10 px-4 py-2 text-[10px] font-black tracking-widest text-white uppercase">
                CARRITO (<span id="cart-count">0</span>)
            </button>
        </div>
    </nav>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>

    <div id="cart-sidebar" class="flex flex-col">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <h2 class="text-[11px] font-black tracking-[0.3em] uppercase text-white">Tu Selección</h2>
            <button onclick="toggleCart()" class="text-xs text-gray-500 font-bold uppercase">Cerrar</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 no-scrollbar space-y-6"></div>
        <div class="p-6 border-t border-white/5 bg-[#141414]">
            <div class="flex justify-between mb-4">
                <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Total Estimado</span>
                <span class="text-white font-black" id="cart-total">S/ 0.00</span>
            </div>
            <button onclick="checkoutWhatsApp()" class="w-full bg-white text-black py-4 text-[10px] font-black uppercase tracking-widest hover:bg-gray-200 transition-all">Enviar pedido a WhatsApp</button>
        </div>
    </div>

    <div id="main-content" class="container mx-auto px-4 py-6">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
            <div id="category-panel" class="hidden md:block md:col-span-2">
                <h3 class="text-[9px] font-black text-white/30 uppercase tracking-[0.3em] mb-4">Filtrar</h3>
                <div class="category-list">
                    <button onclick="filterProducts('TODOS')" class="category-btn active" id="btn-TODOS">TODOS</button>
                    <button onclick="filterProducts('BILLETERAS')" class="category-btn" id="btn-BILLETERAS">BILLETERAS</button>
                    <button onclick="filterProducts('ACCESORIOS')" class="category-btn" id="btn-ACCESORIOS">ACCESORIOS</button>
                    <button onclick="filterProducts('BOLSOS')" class="category-btn" id="btn-BOLSOS">BOLSOS</button>
                    <button onclick="filterProducts('CINTURONES')" class="category-btn" id="btn-CINTURONES">CINTURONES</button>
                    <button onclick="filterProducts('LLAVEROS')" class="category-btn" id="btn-LLAVEROS">LLAVEROS</button>
                    <button onclick="filterProducts('BEADS')" class="category-btn" id="btn-BEADS">BEADS</button>
                </div>
            </div>
            <main class="md:col-span-10 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6" id="products-grid"></main>
        </div>
    </div>

    <div id="single-product-view" class="hidden container mx-auto px-4 py-6 min-h-screen">
        <button onclick="goHome()" class="mb-6 text-[10px] font-black uppercase tracking-widest text-gray-500 hover:text-white transition-colors">← Regresar</button>
        <div id="product-detail-content"></div>
    </div>

    <script>
        const products = [
            { id: 1, cat: "BOLSOS", name: "UTILITY DOPP KIT DISTRESSED CHOCOLATE", desc: "NECESER TODO TERRENO CON AMPLIO ESPACIO, BOLSILLO CON CIERRE, BOLSILLOS LATERALES Y HANDLE DE DOBLE AGARRE, PERFECTO PARA TUS ARTÍCULOS DE USO DIARIO (ASEO, TECH, ETC.)<br><br>MEDIDAS: 16 cm X 25 cm APROX (SIN CONTAR EL HANDLE)<br>MATERIALES: CUERO DE RES FULL GRAIN, CANVAS DE ALTO GRAMAJE, CORDURA NYLON, ACERO INOXIDABLE Y LATÓN.", price: 179, imgs: ["DOPPKITmarron.png", "detalleDOPPKIT.png", "detalleDOPPKIT2.png"], variants: [] },
            { id: 2, cat: "BILLETERAS", name: "ZIPPERED WALLET", desc: "BILLETERA MINIMALISTA DE DISEÑO JAPONES PARA TARJETAS, BILLETES Y MONEDAS.<br><br>MEDIDAS: 9.5 CM X 11 CM APROX.<br>MATERIALES: CUERO DE RES FULL GRAIN Y HERRAJE DE LATÓN MACIZO.", price: 89, imgs: ["ZIPPERED.png", "ZIPPEREDdetalle.png"], variants: [] },
            { id: 3, cat: "BILLETERAS", name: "GANADERO WALLET", desc: "BIFOLD HÍBRIDA CON ESPACIO PARA TARJETAS, BILLETES Y 4 ESPACIOS PEQUEÑOS PARA MINI HERRAMIENTAS DE VICTORINOX.<br><br>MEDIDAS: 10.5 CM X 9 CM APROX.<br>MATERIALES: CUERO DE RES FULL GRAIN Y TELA CORDURA.", price: 109, varPhotos: { "MARRON": ["GANADERO.png", "GANADEROabierto.png", "GANADEROdetalle.png"], "NEGRO": ["GANADEROnegro.png", "GANADEROnegroabierto.png", "GANADEROdetallenegro.png"] }, variants: ["MARRON", "NEGRO"], selected: "MARRON" },
            { id: 4, cat: "BILLETERAS", name: "DÍDAC WALLET", desc: "TARJETERO MINIMALISTA PERFECTO PARA USO DIARIO PUEDES LLEVAR TARJETAS Y BILLETES.<br><br>MEDIDAS: 6.7 cm X 10.5 cm APROX.<br>MATERIALES: CUERO DE RES FULL GRAIN Y HERRAJE DE LATON / ACERO INOXIDABLE.", price: 129, varPhotos: { "MARRON": ["didac.png", "DIDACatras.png"], "NEGRO": ["DIDACnegro.png"] }, variants: ["MARRON", "NEGRO"], selected: "MARRON" },
            { id: 5, cat: "ACCESORIOS", name: "MULTITOOL CARD + FUNDA", desc: "TARJETA MULTIHERRAMIENTA CON 10 FUNCIONES (ABRE LATAS, DESTORNILLADOR, LLAVES, ETC.)<br><br>MATERIAL: ACERO INOXIDABLE.", price: 89, varPhotos: { "CUERO": ["MULTITOOLfunda.png", "MULTITOOL.png"], "NEGRO": ["MULTITOOLfundanegra.png", "MULTITOOL.png"] }, variants: ["CUERO", "NEGRO"], selected: "CUERO" },
            { id: 6, cat: "ACCESORIOS", name: "UTILITY TRAY", desc: "BANDEJA PARA COLOCAR OBJETOS DE BOLSILLO PERFECTO PARA TU CASA U OFICINA.<br><br>MATERIALES: CUERO DE RES FULL GRAIN, HERRAJE DE ACERO INOXIDABLE Y TELA TWEED.", price: 99, varPhotos: { "SMALL": ["BANDEJAS.png"], "MEDIUM": ["BANDEJAM.png"], "LARGE": ["BANDEJAL.png"] }, varPrices: { "SMALL": 99, "MEDIUM": 129, "LARGE": 159 }, variants: ["SMALL", "MEDIUM", "LARGE"], selected: "SMALL" },
            { id: 7, cat: "ACCESORIOS", name: "PORTALENTES", desc: "FUNDA PARA LENTES CON INTERIOR ANTIRRAYONES Y OJAL PARA ENGANCHE.<br><br>MEDIDAS: 18 cm X 7.5 cm APROX.<br>MATERIALES: CUERO DE RES FULL GRAIN, HERRAJE DE LATÓN Y ACERO INOXIDABLE.", price: 99, imgs: ["PORTALENTES.png", "PORTALENTESatras.png"], variants: [] },
            { id: 8, cat: "CINTURONES", name: "MIGHTY BELT + BLACK BUCKLE", desc: "CORREA TODO TERRENO DE PERFIL CASUAL PERFECTA PARA TODAS TUS AVENTURAS.<br><br>MEDIDAS: 4 cm DE ANCHO X LARGO PERSONALIZABLE.<br>MATERIALES: CUERO DE RES FULL GRAIN Y HERRAJE DE ACERO INOXIDABLE PAVONADO EN NEGRO.", price: 149, imgs: ["MIGHTY.png", "MIGHTYcompleta.png"], variants: [] },
            { id: 9, cat: "LLAVEROS", name: "EL GANCHO", desc: "LLAVERO CON MOSQUETÓN DE PERFIL TÁCTICO.<br><br>MEDIDAS: 13.5 cm X 3 cm APROX.<br>MATERIALES: CUERO DE RES FULL GRAIN Y HERRAJE DE ACERO INOXIDABLE.", price: 79, varPhotos: { "MARRON": ["GANCHO.png"], "NEGRO": ["GANCHOnegro.png"] }, variants: ["MARRON", "NEGRO"], selected: "MARRON" },
            { id: 10, cat: "BEADS", name: "SKULL BEAD", desc: "CUENTA DECORATIVA.<br><br>MATERIAL: LATÓN MACIZO.", price: 89, imgs: ["SKULLBEAD.png"], variants: [] },
            { id: 11, cat: "BEADS", name: "BABY DEVIL BEAD", desc: "CUENTA DECORATIVA.<br><br>MATERIAL: LATÓN MACIZO.", price: 99, imgs: ["BABYDEVIL.png"], variants: [] },
            { id: 12, cat: "ACCESORIOS", name: "COASTERS", desc: "SET DE POSAVASOS DE CUERO DE PERFIL RÚSTICO INDISPENSABLES PARA TU CRISTALERIA.<br><br>MEDIDAS: 11 cm (DIAMETRO).<br>MATERIALES: CUERO DE RES FULL GRAIN.", price: 89, varPhotos: { "SET DE 4": ["COASTERS.png", "COASTERsola.png"], "SET DE 6": ["COASTERS.png", "COASTERsola.png"] }, varPrices: { "SET DE 4": 89, "SET DE 6": 119 }, variants: ["SET DE 4", "SET DE 6"], selected: "SET DE 4" }
        ];

        let cart = JSON.parse(localStorage.getItem('cart_1811')) || [];
        let currentImgIdx = {};

        function init() {
            updateCartUI(); 
            const params = new URLSearchParams(window.location.search);
            if (params.get('id')) showSingleProduct(parseInt(params.get('id')));
            else render();
        }

        function toggleCategories() { document.getElementById('category-panel').classList.toggle('hidden'); }
        function goHome() { window.location.href = "index.html"; }

        function render(filter = 'TODOS') {
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('single-product-view').classList.add('hidden');
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            const filtered = filter === 'TODOS' ? products : products.filter(p => p.cat === filter);

            filtered.forEach(p => {
                let gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : p.imgs;
                let displayPrice = p.varPrices ? p.varPrices[p.selected] : p.price;
                const div = document.createElement('div');
                div.className = "product-card p-4";
                div.innerHTML = `
                    <div class="aspect-square mb-4 overflow-hidden cursor-pointer bg-black" onclick="window.location.href='?id=${p.id}'">
                        <img src="${gallery[0]}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-[10px] text-white tracking-widest uppercase">${p.name}</h3>
                            <span class="text-[10px] text-gray-500 font-bold">S/ ${displayPrice}</span>
                        </div>
                        <button onclick="window.location.href='?id=${p.id}'" class="w-full border border-white/10 py-3 text-[9px] font-black uppercase tracking-widest mt-2 hover:bg-white hover:text-black transition-all">Ver Detalle</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function showSingleProduct(id) {
            document.getElementById('main-content').classList.add('hidden');
            const view = document.getElementById('single-product-view');
            const container = document.getElementById('product-detail-content');
            view.classList.remove('hidden');
            const p = products.find(prod => prod.id === id);
            if(!p) return;
            if(currentImgIdx[p.id] === undefined) currentImgIdx[p.id] = 0;
            let gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : p.imgs;
            let price = p.varPrices ? p.varPrices[p.selected] : p.price;

            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12">
                    <div class="relative aspect-square bg-black overflow-hidden rounded-sm">
                        ${gallery.length > 1 ? `<div class="nav-arrow left-arrow" onclick="changeImg(${p.id}, -1)">‹</div>` : ''}
                        ${gallery.length > 1 ? `<div class="nav-arrow right-arrow" onclick="changeImg(${p.id}, 1)">›</div>` : ''}
                        <img src="${gallery[currentImgIdx[p.id]]}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex flex-col justify-center">
                        <span class="text-[9px] text-white/40 font-black tracking-[0.3em] uppercase mb-2">${p.cat}</span>
                        <h1 class="text-2xl md:text-4xl font-black text-white uppercase tracking-tighter mb-2 leading-none">${p.name}</h1>
                        <p class="text-xl md:text-2xl text-white font-bold mb-6">S/ ${price}</p>
                        <p class="text-xs leading-relaxed text-gray-400 uppercase font-bold mb-8 border-l border-white/20 pl-4">${p.desc}</p>
                        <div class="flex flex-wrap gap-2 mb-10">
                            ${p.variants.map(v => `<button onclick="setVar(${p.id}, '${v}')" class="variant-btn ${p.selected === v ? 'selected' : ''}">${v}</button>`).join('')}
                        </div>
                        <button onclick="addToCart(${p.id})" class="w-full bg-white text-black py-5 text-[11px] font-black uppercase tracking-[0.2em] active:scale-95 transition-all">Añadir al Carrito</button>
                    </div>
                </div>
            `;
        }

        function setVar(id, v) {
            const p = products.find(prod => prod.id === id);
            p.selected = v;
            currentImgIdx[id] = 0;
            showSingleProduct(id);
        }

        function changeImg(id, dir) {
            const p = products.find(prod => prod.id === id);
            let gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : p.imgs;
            currentImgIdx[id] = (currentImgIdx[id] + dir + gallery.length) % gallery.length;
            showSingleProduct(id);
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
            document.getElementById('cart-overlay').classList.toggle('active');
        }

        function addToCart(id) {
            const p = products.find(prod => prod.id === id);
            const price = p.varPrices ? p.varPrices[p.selected] : p.price;
            cart.push({ ...p, currentPrice: price, currentVariant: p.selected });
            localStorage.setItem('cart_1811', JSON.stringify(cart));
            updateCartUI();
            if(!document.getElementById('cart-sidebar').classList.contains('open')) toggleCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart_1811', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const count = document.getElementById('cart-count');
            const total = document.getElementById('cart-total');
            count.innerText = cart.length;
            container.innerHTML = '';
            let sum = 0;
            cart.forEach((item, index) => {
                sum += item.currentPrice;
                let gallery = (item.varPhotos && item.varPhotos[item.currentVariant]) ? item.varPhotos[item.currentVariant] : item.imgs;
                container.innerHTML += `
                    <div class="flex gap-4 items-center border-b border-white/5 pb-4 animate-in fade-in duration-300">
                        <img src="${gallery[0]}" class="w-16 h-16 object-cover bg-black rounded-sm">
                        <div class="flex-1 text-[9px] uppercase font-black">
                            <h4 class="text-white">${item.name}</h4>
                            <p class="text-gray-500">${item.currentVariant || ''}</p>
                            <p class="text-white mt-1">S/ ${item.currentPrice}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-xs text-red-900 px-2">✕</button>
                    </div>`;
            });
            total.innerText = `S/ ${sum.toFixed(2)}`;
        }

        function checkoutWhatsApp() {
            if(cart.length === 0) return alert("Selecciona productos primero");
            let sum = 0;
            let msg = `Hola 1811, quisiera realizar este pedido:\n\n`;
            cart.forEach(item => {
                msg += `• *${item.name}* ${item.currentVariant ? '('+item.currentVariant+')' : ''} - S/ ${item.currentPrice}\n`;
                sum += item.currentPrice;
            });
            msg += `\n*TOTAL ESTIMADO: S/ ${sum.toFixed(2)}*\n\nQuedo atento a la confirmación de stock.`;
            window.open(`https://wa.me/51947833118?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function filterProducts(cat) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${cat}`).classList.add('active');
            if (window.innerWidth < 768) toggleCategories();
            render(cat);
        }

        init();
    </script>
</body>
</html>
