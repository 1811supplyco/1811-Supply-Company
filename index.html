    <style>
        body { background-color: #0a0a0a; color: #d1d1d1; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .product-card { background-color: #111111; border: 1px solid #1f1f1f; display: flex; flex-direction: column; height: 100%; }
        
        .category-btn { text-align: left; padding: 12px 0; border-bottom: 1px solid #1f1f1f; font-size: 11px; font-weight: 900; color: #555; text-transform: uppercase; transition: 0.3s; width: 100%; }
        .category-btn.active { color: white; border-bottom-color: white; padding-left: 10px; }

        .variant-btn { border: 1px solid #333; font-size: 9px; padding: 6px 10px; cursor: pointer; color: #666; font-weight: 900; text-transform: uppercase; transition: 0.2s; }
        .variant-btn.selected { background-color: white; color: black; border-color: white; }
        
        #cart-sidebar { position: fixed; right: -100%; top: 0; width: 85%; max-width: 380px; height: 100%; background: #0f0f0f; z-index: 200; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid #222; }
        #cart-sidebar.open { right: 0; }
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 150; display: none; }
        .cart-overlay.active { display: block; }

        /* ESTILOS CARRUSEL TÁCTIL + PC */
        .carousel-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            height: 100%;
        }
        .carousel-container::-webkit-scrollbar { display: none; }
        .carousel-item { min-width: 100%; height: 100%; scroll-snap-align: start; }

        .nav-area { position: absolute; top: 0; height: 100%; width: 35%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 60; }
        .left-area { left: 0; }
        .right-area { right: 0; }
        .nav-arrow-mini { background: rgba(255, 255, 255, 0.1); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; opacity: 0; transition: all 0.2s ease; backdrop-filter: blur(4px); }
        .nav-area:hover .nav-arrow-mini { opacity: 1; background: rgba(255, 255, 255, 0.9); color: black; }
        
        @media (max-width: 768px) { 
            .nav-area { display: none; } 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        body.product-open #mobile-cat-trigger { display: block; }
        #category-panel-mobile { position: fixed; top: 104px; left: 0; width: 100%; background: #0a0a0a; z-index: 90; padding: 20px; border-bottom: 1px solid #1f1f1f; display: none; }
        #category-panel-mobile.active { display: block; }
        .category-slider { display: flex; overflow-x: auto; scroll-behavior: smooth; gap: 15px; padding: 10px 0; }
        .category-slider::-webkit-scrollbar { display: none; }
        .category-banner { background: #111; border: 1px solid #1f1f1f; padding: 20px; margin-bottom: 40px; border-radius: 4px; }
        .titulo-destacado { font-family: 'Oswald', sans-serif !important; font-weight: 700; line-height: 1.2; letter-spacing: 0.05em; }
    </style>
</head>

        let cart = JSON.parse(localStorage.getItem('cart_1811')) || [];

        function init() {
            updateCartUI(); 
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            const cat = params.get('cat');

            if (productId) {
                showSingleProduct(parseInt(productId));
            } else if (cat && cat !== 'TODOS') {
                render(cat);
            } else {
                renderHomeWithBanners();
            }
        }

        function renderHomeWithBanners() {
            document.getElementById('body-tag').classList.remove('product-open');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('single-product-view').classList.add('hidden');
            document.getElementById('view-title').innerHTML = "ARTICULOS BRAVAZOS CON LOS MEJORES MATERIALES HECHOS EN PERÚ";
            
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-TODOS').classList.add('active');

            const grid = document.getElementById('products-grid');
            grid.className = "md:col-span-10 flex flex-col"; 
            grid.innerHTML = '';

            const categories = ["BILLETERAS", "ACCESORIOS", "BOLSOS", "CINTURONES", "LLAVEROS", "BEADS"];

            categories.forEach(cat => {
                const catProducts = products.filter(p => p.cat === cat);
                if(catProducts.length === 0) return;

                const section = document.createElement('div');
                section.className = "category-banner";
                section.innerHTML = `
                    <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-2">
                        <h2 class="text-[10px] font-black tracking-widest text-white uppercase">${cat}</h2>
                        <button onclick="filterProducts('${cat}')" class="text-[9px] text-gray-500 font-bold uppercase hover:text-white">Ver Todo →</button>
                    </div>
                    <div class="category-slider no-scrollbar">
                        ${catProducts.map(p => `
                            <div class="min-w-[160px] md:min-w-[220px] cursor-pointer group" onclick="window.location.href='?id=${p.id}'">
                                <div class="aspect-square bg-black mb-2 overflow-hidden">
                                    <img src="${p.imgs ? p.imgs[0] : p.varPhotos[p.selected][0]}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                                </div>
                                <h4 class="text-[8px] md:text-[9px] font-black text-white uppercase truncate">${p.name}</h4>
                                <p class="text-[8px] text-gray-400 font-bold">S/ ${p.price}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
                grid.appendChild(section);
            });
        }

        function render(filter = 'TODOS') {
            document.getElementById('body-tag').classList.remove('product-open');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('single-product-view').classList.add('hidden');
            document.getElementById('category-panel-mobile').classList.remove('active');
            document.getElementById('view-title').innerText = filter;
            
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${filter}`);
            if(activeBtn) activeBtn.classList.add('active');

            const grid = document.getElementById('products-grid');
            grid.className = "md:col-span-10 grid grid-cols-2 lg:grid-cols-3 gap-3 md:gap-6";
            grid.innerHTML = '';
            
            const filtered = products.filter(p => p.cat === filter);
            filtered.forEach(p => {
                let gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : p.imgs;
                let displayPrice = p.varPrices ? p.varPrices[p.selected] : p.price;
                const div = document.createElement('div');
                div.className = "product-card p-2 md:p-4";
                div.innerHTML = `
                    <div class="aspect-square mb-2 md:mb-4 overflow-hidden cursor-pointer bg-black" onclick="window.location.href='?id=${p.id}'">
                        <img src="${gallery[0]}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-500">
                    </div>
                    <div class="flex flex-col flex-1">
                        <div class="flex flex-col mb-2">
                            <h3 class="font-bold text-[8px] md:text-[10px] text-white tracking-widest uppercase mb-1">${p.name}</h3>
                            <span class="text-[9px] md:text-[10px] text-gray-400 font-bold">S/ ${displayPrice}</span>
                        </div>
                        <div class="mt-auto flex flex-col gap-2">
                            <button onclick="addToCart(${p.id})" class="w-full bg-white text-black py-2 md:py-3 text-[8px] md:text-[9px] font-black uppercase tracking-widest hover:bg-gray-200 transition-all">Añadir</button>
                        </div>
                    </div>`;
                grid.appendChild(div);
            });
        }

        function filterProducts(cat) { window.location.href = `index.html?cat=${cat}`; }

        function showSingleProduct(id) {
            document.getElementById('body-tag').classList.add('product-open');
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('category-panel-mobile').classList.remove('active');
            const view = document.getElementById('single-product-view');
            const container = document.getElementById('product-detail-content');
            view.classList.remove('hidden');
            
            const p = products.find(prod => prod.id === id);
            if(!p) return;

            if (currentImgIdx[p.id] === undefined) currentImgIdx[p.id] = 0;
            let gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : p.imgs;
            let price = p.varPrices ? p.varPrices[p.selected] : p.price;
            let extraDesc = p.varDesc ? `<br>${p.varDesc[p.selected]}` : '';

            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12">
                    <div class="relative aspect-square bg-black overflow-hidden rounded-sm group">
                        <div class="carousel-container" id="carousel-${p.id}" onscroll="updateDotsOnScroll(${p.id})">
                            ${gallery.map((img, i) => `
                                <div class="carousel-item">
                                    <img src="${img}" class="w-full h-full object-cover">
                                </div>
                            `).join('')}
                        </div>

                        ${gallery.length > 1 ? `
                        <div class="nav-area left-area" onclick="changeImg(${p.id}, -1)">
                            <div class="nav-arrow-mini">❮</div>
                        </div>
                        <div class="nav-area right-area" onclick="changeImg(${p.id}, 1)">
                            <div class="nav-arrow-mini">❯</div>
                        </div>
                        
                        <div class="absolute bottom-4 left-0 right-0 flex justify-center gap-1.5 z-[70] pointer-events-none">
                            ${gallery.map((_, i) => `
                                <div id="dot-${p.id}-${i}" class="w-1.5 h-1.5 rounded-full transition-all ${i === currentImgIdx[p.id] ? 'bg-white scale-110' : 'bg-white/30'}"></div>
                            `).join('')}
                        </div>
                        ` : ''}
                    </div>

                    <div class="flex flex-col justify-center">
                        <span class="text-[9px] text-white/40 font-black tracking-[0.3em] uppercase mb-2">${p.cat}</span>
                        <h1 class="text-2xl md:text-4xl font-black text-white uppercase tracking-tighter mb-2 leading-none">${p.name}</h1>
                        <p class="text-xl md:text-2xl text-white font-bold mb-6">S/ ${price}</p>
                        <div class="text-[11px] leading-relaxed text-gray-400 uppercase font-bold mb-8 border-l border-white/20 pl-4">
                            ${p.desc}
                            ${extraDesc}
                        </div>
                        <div class="flex flex-wrap gap-2 mb-10">
                            ${p.variants.map(v => `<button onclick="setVar(${p.id}, '${v}')" class="variant-btn ${p.selected === v ? 'selected' : ''}">${v}</button>`).join('')}
                        </div>
                        <button onclick="addToCart(${p.id})" class="w-full bg-white text-black py-5 text-[11px] font-black uppercase tracking-[0.2em] active:scale-95 transition-all">Añadir al Carrito</button>
                    </div>
                </div>`;
            
            // Posicionar el scroll en la imagen guardada
            setTimeout(() => {
                const carousel = document.getElementById(`carousel-${p.id}`);
                if(carousel) carousel.scrollLeft = carousel.clientWidth * currentImgIdx[p.id];
            }, 10);
        }

        // Cambio manual por clic (PC)
        function changeImg(id, step) {
            const p = products.find(x => x.id === id);
            let gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : p.imgs;
            const carousel = document.getElementById(`carousel-${id}`);
            
            currentImgIdx[id] = (currentImgIdx[id] + step + gallery.length) % gallery.length;
            carousel.scrollTo({ left: carousel.clientWidth * currentImgIdx[id], behavior: 'smooth' });
        }

        // Sincronizar puntos al deslizar (Celular)
        function updateDotsOnScroll(id) {
            const carousel = document.getElementById(`carousel-${id}`);
            const p = products.find(x => x.id === id);
            let gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : p.imgs;
            
            const newIdx = Math.round(carousel.scrollLeft / carousel.clientWidth);
            if(newIdx !== currentImgIdx[id]) {
                currentImgIdx[id] = newIdx;
                gallery.forEach((_, i) => {
                    const dot = document.getElementById(`dot-${id}-${i}`);
                    if(dot) dot.className = `w-1.5 h-1.5 rounded-full transition-all ${i === newIdx ? 'bg-white scale-110' : 'bg-white/30'}`;
                });
            }
        }

        function setVar(id, v) {
            const p = products.find(prod => prod.id === id);
            p.selected = v;
            currentImgIdx[id] = 0; // Reiniciar a la primera foto de la variante
            showSingleProduct(id);
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
            document.getElementById('cart-overlay').classList.toggle('active');
        }

        function addToCart(id) {
            const p = products.find(prod => prod.id === id);
            const price = p.varPrices ? p.varPrices[p.selected] : p.price;
            cart.push({ ...p, currentPrice: price, currentVariant: p.selected });
            localStorage.setItem('cart_1811', JSON.stringify(cart));
            updateCartUI();
            if(!document.getElementById('cart-sidebar').classList.contains('open')) toggleCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart_1811', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const count = document.getElementById('cart-count');
            const total = document.getElementById('cart-total');
            count.innerText = cart.length;
            container.innerHTML = '';
            let sum = 0;
            cart.forEach((item, index) => {
                sum += item.currentPrice;
                let gallery = (item.varPhotos && item.varPhotos[item.currentVariant]) ? item.varPhotos[item.currentVariant] : item.imgs;
                container.innerHTML += `
                    <div class="flex gap-4 items-center border-b border-white/5 pb-4">
                        <img src="${gallery[0]}" class="w-16 h-16 object-cover bg-black rounded-sm">
                        <div class="flex-1 text-[9px] uppercase font-black">
                            <h4 class="text-white">${item.name}</h4>
                            <p class="text-gray-500">${item.currentVariant || ''}</p>
                            <p class="text-white mt-1">S/ ${item.currentPrice}</p>
                        </div>
                        <button class="text-red-500 text-xs" onclick="removeFromCart(${index})">Eliminar</button>
                    </div>`;
            });
            total.innerText = `S/ ${sum.toFixed(2)}`;
        }

        function checkoutWhatsApp() {
            if(cart.length === 0) return;
            let sum = 0;
            let msg = `Hola 1811, quisiera realizar este pedido:\n\n`;
            cart.forEach(item => {
                msg += `• *${item.name}* ${item.currentVariant ? '('+item.currentVariant+')' : ''} - S/ ${item.currentPrice}\n`;
                sum += item.currentPrice;
            });
            msg += `\n*TOTAL: S/ ${sum.toFixed(2)}*`;
            const phone = "51947833118";
            window.location.href = `whatsapp://send?phone=${phone}&text=${encodeURIComponent(msg)}`;
        }

        function toggleCategoriesMobile() { document.getElementById('category-panel-mobile').classList.toggle('active'); }
        
        // Ejecutar init al cargar la página
        window.onload = init;
    </script>
</body>
</html>
