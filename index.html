<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1811 SUPPLY CO. | Tienda Oficial</title>
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .font-1811 { font-family: 'UnifrakturMaguntia', serif; font-size: 3.5rem; color: white; line-height: 1; }
        .font-supply { font-family: 'Inter', sans-serif; font-weight: 900; letter-spacing: -0.05em; color: #666; font-size: 1.2rem; text-transform: uppercase; }
        
        body { background-color: #0a0a0a; color: #d1d1d1; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* FUERZA COLOR TOTAL */
        img { filter: none !important; -webkit-filter: grayscale(0%) !important; opacity: 1 !important; }

        .product-card { background-color: #111111; border: 1px solid #1f1f1f; position: relative; }
        
        /* Categorías */
        .category-btn { transition: all 0.2s; border-bottom: 2px solid transparent; cursor: pointer; padding-bottom: 4px; white-space: nowrap; }
        .category-btn.active { border-color: white; color: white; font-weight: 900; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Capa de Información (Descripción) */
        .info-overlay { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.92); 
            padding: 2rem; display: flex; flex-direction: column; justify-content: center; 
            opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 30; 
        }
        .info-overlay.active { opacity: 1; pointer-events: auto; }

        /* Botones de variantes */
        .variant-btn { border: 1px solid #333; font-size: 9px; padding: 4px 8px; cursor: pointer; color: #888; }
        .variant-btn.selected { background-color: white; color: black; font-weight: 900; border-color: white; }

        /* Flechas de Navegación */
        .nav-arrow { 
            background: rgba(0,0,0,0.6); color: white; width: 32px; height: 32px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; position: absolute; top: 50%; transform: translateY(-50%); 
            z-index: 20; font-size: 18px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-arrow:hover { background: white; color: black; }
        
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; width: 100%; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <!-- Header -->
    <nav class="p-8 sticky top-0 bg-[#0a0a0a] z-[100] border-b border-white/5">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span class="font-1811">1811</span>
                <span class="font-supply">Supply Co.</span>
            </div>
            <button onclick="toggleCart()" class="text-[10px] font-black tracking-widest text-white uppercase">
                Carrito (<span id="cart-count">0</span>)
            </button>
        </div>
    </nav>

    <!-- Menú de Categorías -->
    <div class="container mx-auto px-6 mt-10">
        <div class="flex gap-8 border-b border-white/5 pb-4 text-[10px] font-bold text-gray-500 uppercase tracking-widest overflow-x-auto no-scrollbar">
            <button onclick="filterProducts('TODOS')" class="category-btn active" id="btn-TODOS">TODOS</button>
            <button onclick="filterProducts('BILLETERAS')" class="category-btn" id="btn-BILLETERAS">BILLETERAS</button>
            <button onclick="filterProducts('ACCESORIOS')" class="category-btn" id="btn-ACCESORIOS">ACCESORIOS</button>
            <button onclick="filterProducts('BOLSOS')" class="category-btn" id="btn-BOLSOS">BOLSOS</button>
            <button onclick="filterProducts('CINTURONES')" class="category-btn" id="btn-CINTURONES">CINTURONES</button>
            <button onclick="filterProducts('LLAVEROS')" class="category-btn" id="btn-LLAVEROS">LLAVEROS</button>
            <button onclick="filterProducts('BEADS')" class="category-btn" id="btn-BEADS">BEADS</button>
        </div>
    </div>

    <!-- Tienda -->
    <main class="container mx-auto p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10" id="products-grid"></main>

    <!-- Modal del Carrito -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/95 z-[200] flex justify-end">
        <div class="bg-[#0c0c0c] w-full max-w-md h-full p-10 flex flex-col border-l border-white/10 overflow-y-auto">
            <div id="cart-view">
                <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
                    <h2 class="text-xs font-black uppercase text-white tracking-widest">Tu Pedido</h2>
                    <button onclick="toggleCart()" class="text-[10px] text-gray-500">CERRAR</button>
                </div>
                <div id="cart-items" class="space-y-6 mb-10"></div>
                <div class="border-t border-white/10 pt-8">
                    <div class="flex justify-between items-center mb-10">
                        <span class="text-[10px] text-gray-500 uppercase">Total Estimado</span>
                        <span class="text-2xl text-white font-black">S/ <span id="cart-total">0</span></span>
                    </div>
                    <button onclick="showCheckout()" class="w-full bg-white text-black py-5 font-black uppercase tracking-widest text-[10px]">Ir a Pagar</button>
                </div>
            </div>

            <div id="checkout-view" class="hidden text-left">
                <button onclick="hideCheckout()" class="mb-8 text-[10px] text-gray-600 uppercase font-bold">← Regresar</button>
                <h3 class="text-white font-black text-xs uppercase mb-6">Datos de Envío</h3>
                <input type="text" id="f-nombre" placeholder="Nombre y Apellido">
                <input type="tel" id="f-cel" placeholder="Número de WhatsApp">
                <input type="text" id="f-distrito" placeholder="Distrito (Lima / Provincia)">
                <button onclick="processOrder()" class="w-full bg-[#128C7E] text-white py-5 mt-4 font-black uppercase tracking-widest text-[10px]">Pedir por WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, cat: "BOLSOS", name: "UTILITY DOPP KIT", desc: "Neceser full grain de alta capacidad. Interior forrado en lona repelente al agua. Medidas: 25x16cm.", price: 179, imgs: ["DOPPKITdetalle.png"], variants: [] },
            { id: 2, cat: "BILLETERAS", name: "ZIPPERED WALLET", desc: "Billetera con cierre de latón. Espacio para 8 tarjetas y billetes doblados.", price: 89, imgs: ["ZIPPERED.png", "ZIPPERED2.png"], variants: [] },
            { id: 3, cat: "BILLETERAS", name: "GANADERO WALLET", desc: "Diseño robusto para el día a día. Cuero curtido al vegetal con espacio para Victorinox.", price: 109, imgs: ["GANADERO.png"], varPhotos: { "MARRON": ["GANADERO.png"], "NEGRO": ["GANADEROnegro.png"] }, variants: ["MARRON", "NEGRO"], selected: "MARRON" },
            { id: 4, cat: "BILLETERAS", name: "DÍDAC WALLET", desc: "Tarjetero minimalista para el Everyday Carry.", price: 129, imgs: ["didac.png"], varPhotos: { "MARRON": ["didac.png"], "NEGRO": ["DIDACnegro.png"] }, variants: ["MARRON", "NEGRO"], selected: "MARRON" },
            { id: 6, cat: "ACCESORIOS", name: "UTILITY TRAY", desc: "Bandeja de descarga para tus esenciales. Hecha de cuero genuino y Tweed.", price: 99, 
                varPhotos: { 
                    "SMALL": ["tray-s.png"], 
                    "MEDIUM": ["tray-m.png"], 
                    "LARGE": ["tray-l.png"] 
                }, 
                varPrices: { "SMALL": 99, "MEDIUM": 129, "LARGE": 159 }, 
                variants: ["SMALL", "MEDIUM", "LARGE"], selected: "SMALL" },
            { id: 8, cat: "CINTURONES", name: "MIGHTY BELT", desc: "Correa de cuero de 4mm de grosor. Hebilla de acero inoxidable Black Buckle.", price: 149, imgs: ["MIGHTY.png", "MIGHTY2.png"], variants: [] },
            { id: 10, cat: "BEADS", name: "SKULL BRASS BEAD", desc: "Abalorio de latón macizo para tus navajas o llaveros EDC.", price: 45, imgs: ["BEAD1.png", "BEAD1_alt.png"], variants: [] },
            { id: 11, cat: "LLAVEROS", name: "LEATHER KEY FOB", desc: "Llavero de cuero genuino con herrajes de alta resistencia.", price: 35, imgs: ["LLAVERO.png"], variants: [] }
        ];

        let cart = [];
        let currentImgIdx = {}; 

        function render(filter = 'TODOS') {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            const filtered = filter === 'TODOS' ? products : products.filter(p => p.cat === filter);

            filtered.forEach(p => {
                if(currentImgIdx[p.id] === undefined) currentImgIdx[p.id] = 0;
                
                // Prioridad de fotos: Variantes > Galería General
                let gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : (p.imgs || []);
                const price = p.varPrices ? p.varPrices[p.selected] : p.price;

                const div = document.createElement('div');
                div.className = "product-card p-6";
                div.innerHTML = `
                    <div class="relative group aspect-square mb-6 overflow-hidden">
                        <!-- Flechas -->
                        ${gallery.length > 1 ? `<div class="nav-arrow left-2" onclick="event.stopPropagation(); changeImg(${p.id}, -1, '${filter}')">‹</div>` : ''}
                        ${gallery.length > 1 ? `<div class="nav-arrow right-2" onclick="event.stopPropagation(); changeImg(${p.id}, 1, '${filter}')">›</div>` : ''}
                        
                        <!-- Imagen Principal -->
                        <img src="${gallery[currentImgIdx[p.id]] || 'placeholder.png'}" 
                             onclick="toggleInfo(${p.id})" 
                             class="w-full h-full object-cover cursor-help">
                        
                        <!-- Capa de Info -->
                        <div id="info-${p.id}" class="info-overlay" onclick="toggleInfo(${p.id})">
                            <h4 class="text-white font-black text-xs uppercase mb-3 border-b border-white/20 pb-2">Especificaciones</h4>
                            <p class="text-[10px] leading-relaxed text-gray-300 uppercase tracking-widest">${p.desc}</p>
                            <p class="mt-6 text-[9px] text-white font-bold uppercase tracking-widest bg-white/10 py-2 text-center">Toca para cerrar</p>
                        </div>
                    </div>

                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-black text-[11px] text-white tracking-widest uppercase">${p.name}</h3>
                        <span class="text-xs text-gray-400">S/ ${price}</span>
                    </div>

                    <!-- Variantes -->
                    <div class="flex gap-2 mb-8 h-8">
                        ${p.variants.map(v => `<button onclick="setVar(${p.id}, '${v}', '${filter}')" class="variant-btn ${p.selected === v ? 'selected' : ''}">${v}</button>`).join('')}
                    </div>
                    
                    <button onclick="add(${p.id})" class="w-full bg-white text-black py-4 text-[10px] font-black uppercase tracking-widest hover:bg-gray-200 transition-colors">Agregar al Carrito</button>
                `;
                grid.appendChild(div);
            });
        }

        // Navegación de imágenes corregida
        function changeImg(id, direction, filter) {
            const p = products.find(prod => prod.id === id);
            let gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : p.imgs;
            
            currentImgIdx[id] = (currentImgIdx[id] + direction + gallery.length) % gallery.length;
            render(filter);
        }

        function toggleInfo(id) {
            document.getElementById(`info-${id}`).classList.toggle('active');
        }

        function filterProducts(cat) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${cat}`).classList.add('active');
            render(cat);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setVar(id, v, f) {
            const p = products.find(prod => prod.id === id);
            p.selected = v;
            currentImgIdx[id] = 0; // Reinicia a la primera foto de la variante
            render(f);
        }

        function add(id) {
            const p = products.find(prod => prod.id === id);
            const gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : p.imgs;
            const price = p.varPrices ? p.varPrices[p.selected] : p.price;
            
            cart.push({ 
                name: p.name, 
                price: price, 
                img: gallery[0], 
                variant: p.selected || '' 
            });
            updateCart();
            toggleCart(true);
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="flex gap-4 items-center border-b border-white/5 pb-4">
                    <img src="${item.img}" class="w-16 h-16 object-cover border border-white/10">
                    <div class="flex-grow">
                        <h4 class="text-[10px] font-black text-white uppercase">${item.name}</h4>
                        <p class="text-[9px] text-gray-500 uppercase">${item.variant}</p>
                        <p class="text-[10px] text-white mt-1">S/ ${item.price}</p>
                    </div>
                    <button onclick="remove(${i})" class="text-red-900 text-xs">✕</button>
                </div>`).join('');
            document.getElementById('cart-total').innerText = cart.reduce((sum, item) => sum + item.price, 0);
        }

        function remove(i) { cart.splice(i, 1); updateCart(); }
        function toggleCart(open) { 
            const m = document.getElementById('cart-modal');
            if(open === true) m.classList.remove('hidden');
            else if(open === false) m.classList.add('hidden');
            else m.classList.toggle('hidden');
        }
        
        function showCheckout() { if(cart.length > 0) { document.getElementById('cart-view').classList.add('hidden'); document.getElementById('checkout-view').classList.remove('hidden'); } }
        function hideCheckout() { document.getElementById('cart-view').classList.remove('hidden'); document.getElementById('checkout-view').classList.add('hidden'); }

        function processOrder() {
            const name = document.getElementById('f-nombre').value;
            const cel = document.getElementById('f-cel').value;
            const dist = document.getElementById('f-distrito').value;
            
            if(!name || !cel) return alert("Por favor completa tu nombre y celular");

            let msg = `*ORDEN 1811 SUPPLY CO*%0A%0A`;
            msg += `*Cliente:* ${name}%0A*WhatsApp:* ${cel}%0A*Distrito:* ${dist}%0A%0A`;
            msg += `*PRODUCTOS:*%0A`;
            cart.forEach(i => msg += `- ${i.name} (${i.variant}) - S/ ${i.price}%0A`);
            msg += `%0A*TOTAL: S/ ${document.getElementById('cart-total').innerText}*`;
            
            window.open(`https://wa.me/51947833118?text=${msg}`);
        }

        // Inicio
        render();
    </script>
</body>
</html>
