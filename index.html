<!-- Reemplaza la sección del botón flotante y el estilo por este bloque -->
<style>
    /* Nueva Barra de Categorías Flotante para Móvil */
    .mobile-category-nav {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 400px;
        background: rgba(15, 15, 15, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50px;
        display: flex;
        overflow-x: auto;
        padding: 8px 15px;
        z-index: 100;
        scrollbar-width: none; /* Firefox */
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    .mobile-category-nav::-webkit-scrollbar { display: none; } /* Chrome/Safari */

    .mobile-nav-item {
        flex: 0 0 auto;
        padding: 8px 16px;
        font-size: 9px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #888;
        transition: 0.3s;
    }

    .mobile-nav-item.active {
        color: white;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
    }

    /* Ocultar en escritorio */
    @media (min-width: 768px) {
        .mobile-category-nav { display: none; }
    }
</style>

<!-- Reemplaza el botón antiguo por esta estructura -->
<div class="mobile-category-nav" id="floating-nav">
    <button onclick="filterProducts('TODOS')" class="mobile-nav-item" id="m-btn-TODOS">Todos</button>
    <button onclick="filterProducts('BILLETERAS')" class="mobile-nav-item" id="m-btn-BILLETERAS">Billeteras</button>
    <button onclick="filterProducts('ACCESORIOS')" class="mobile-nav-item" id="m-btn-ACCESORIOS">Accesorios</button>
    <button onclick="filterProducts('BOLSOS')" class="mobile-nav-item" id="m-btn-BOLSOS">Bolsos</button>
    <button onclick="filterProducts('CINTURONES')" class="mobile-nav-item" id="m-btn-CINTURONES">Correas</button>
    <button onclick="filterProducts('LLAVEROS')" class="mobile-nav-item" id="m-btn-LLAVEROS">Llaveros</button>
    <button onclick="filterProducts('BEADS')" class="mobile-nav-item" id="m-btn-BEADS">Beads</button>
</div>

<script>
    // Actualiza la función render para que también marque como activa la categoría en el menú flotante
    function render(filter = 'TODOS') {
        closeAll();
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('single-product-view').classList.add('hidden');
        
        // Reset de botones en escritorio
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-${filter}`);
        if(activeBtn) activeBtn.classList.add('active');

        // Reset de botones en móvil (la barra flotante)
        document.querySelectorAll('.mobile-nav-item').forEach(b => b.classList.remove('active'));
        const activeMobileBtn = document.getElementById(`m-btn-${filter}`);
        if(activeMobileBtn) {
            activeMobileBtn.classList.add('active');
            // Scroll suave hacia el botón activo en la barrita
            activeMobileBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        const grid = document.getElementById('products-grid');
        grid.innerHTML = '';
        const filtered = filter === 'TODOS' ? products : products.filter(p => p.cat === filter);

        // Si estamos filtrando, hacemos un scroll suave hacia arriba para ver los productos
        if(filter !== 'TODOS') {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        filtered.forEach(p => {
            let gallery = (p.varPhotos && p.varPhotos[p.selected]) ? p.varPhotos[p.selected] : p.imgs;
            let displayPrice = p.varPrices ? p.varPrices[p.selected] : p.price;
            const div = document.createElement('div');
            div.className = "product-card p-4";
            div.innerHTML = `
                <div class="aspect-square mb-4 overflow-hidden cursor-pointer bg-black" onclick="window.location.href='?id=${p.id}'">
                    <img src="${gallery[0]}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-500">
                </div>
                <div class="flex flex-col flex-1">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-[10px] text-white tracking-widest uppercase">${p.name}</h3>
                        <span class="text-[10px] text-gray-400 font-bold">S/ ${displayPrice}</span>
                    </div>
                    <div class="flex flex-wrap gap-1 mb-4">
                        ${p.variants.map(v => `<button onclick="updateGridVar(${p.id}, '${v}', '${filter}')" class="variant-btn ${p.selected === v ? 'selected' : ''}">${v}</button>`).join('')}
                    </div>
                    <button onclick="addToCart(${p.id})" class="w-full bg-white text-black py-3 text-[9px] font-black uppercase tracking-widest">Añadir al Carrito</button>
                </div>`;
            grid.appendChild(div);
        });
    }

    // Lógica para mostrar/ocultar la barra según el scroll
    let lastScrollY = window.scrollY;
    window.addEventListener('scroll', () => {
        const nav = document.getElementById('floating-nav');
        if (window.scrollY > 200) {
            nav.style.display = 'flex';
            nav.style.opacity = '1';
        } else {
            nav.style.opacity = '0';
        }
    });
</script>
